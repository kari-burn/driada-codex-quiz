<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина: Кодекс юного журналиста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0b0f2a 0%, #1b3b5c 70%, #3a8bb9 100%);
            padding: 16px;
        }

        /* карточка викторины */
        .quiz-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 32px 28px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(173, 216, 230, 0.15) inset;
            color: white;
            transition: 0.3s;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 4px 8px #00000040;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .subhead {
            text-align: center;
            font-style: italic;
            margin-bottom: 32px;
            color: #cfecff;
            font-weight: 300;
            border-bottom: 1px dashed #6ba6d0;
            padding-bottom: 12px;
        }

        /* индикатор вопроса */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
            font-size: 1.2rem;
            background: #0a1b2f7a;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .score-badge {
            background: #f5c542;
            color: #0b1a2a;
            font-weight: 700;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: 0 0 12px #ffdb7c;
            font-size: 1.4rem;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.3;
            background: #00000030;
            padding: 15px 20px;
            border-radius: 30px;
            border-left: 5px solid #7ac7ff;
        }

        /* варианты ответов */
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        .answer-item {
            background: rgba(0, 5, 20, 0.5);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            padding: 18px 24px;
            font-size: 1.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .answer-item:hover:not(.disabled-answer) {
            background: rgba(25, 70, 120, 0.7);
            border-color: #a3d0ff;
            transform: scale(1.01);
        }

        /* префикс (А, Б, В, Г) */
        .answer-prefix {
            background: #27496e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: inset 0 -2px 3px #0000005e, 0 4px 4px #0000003d;
            color: #e0f0ff;
        }

        /* цветовые состояния */
        .correct-highlight {
            background: #1f7a3d !important;
            border-color: #a0f0b0 !important;
            box-shadow: 0 0 20px #52ed7f;
        }

        .wrong-highlight {
            background: #a13a3a !important;
            border-color: #ffa2a2 !important;
            opacity: 0.9;
        }

        .show-correct {
            background: #1f7a3d !important;
            border-color: #bef5d0 !important;
            box-shadow: 0 0 20px #6aff8e;
        }

        .disabled-answer {
            pointer-events: none;
            opacity: 0.9;
        }

        /* панель кнопок */
        .nav-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        button {
            background: linear-gradient(to bottom, #eef9ff, #b5d9ff);
            border: none;
            border-radius: 60px;
            padding: 16px 38px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #001c3d;
            cursor: pointer;
            box-shadow: 0 10px 0 #527a9b, 0 6px 20px #00000070;
            transition: 0.08s linear;
            border: 1px solid #ffffffaa;
            letter-spacing: 0.5px;
            flex: 1 1 auto;
            min-width: 200px;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #2d5575, 0 8px 16px #00000070;
        }

        button:disabled {
            opacity: 0.5;
            transform: translateY(5px);
            box-shadow: 0 5px 0 #3d546b;
            pointer-events: none;
            filter: grayscale(0.4);
        }

        .finish-btn {
            background: linear-gradient(to bottom, #fcee9f, #f2b84b);
            box-shadow: 0 10px 0 #9e752b;
            color: #1e2f0a;
        }

        /* экран результатов */
        .result-screen {
            text-align: center;
        }

        .result-title {
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 5px 0 #0d3555;
        }

        .final-score {
            background: #142b40;
            border-radius: 80px;
            padding: 30px;
            font-size: 3.5rem;
            font-weight: 800;
            margin: 40px 0;
            border: 4px solid #ffd966;
            box-shadow: 0 0 40px #f1c40f;
            color: #ffecbb;
        }

        .congrats {
            font-size: 2rem;
            background: #00000040;
            border-radius: 50px;
            padding: 24px;
            backdrop-filter: blur(8px);
            margin-bottom: 40px;
        }

        .restart-btn {
            background: #b3e0ff;
            max-width: 300px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quizContainer">
        <!-- ОСНОВНОЙ БЛОК ВИКТОРИНЫ -->
        <div id="quizActive">
            <h1>📜 Кодекс юного журналиста</h1>
            <div class="subhead">проверь свои профессиональные принципы</div>

            <!-- счётчик вопроса / баллы -->
            <div class="question-header">
                <span id="questionCounter">Вопрос 1 / 10</span>
                <span class="score-badge" id="scoreDisplay">0 ⚡</span>
            </div>

            <!-- сам вопрос -->
            <div class="question-text" id="questionText">Загрузка вопроса...</div>

            <!-- ответы (динамически) -->
            <div class="answers-grid" id="answersContainer"></div>

            <!-- панель управления -->
            <div class="nav-panel">
                <button id="nextBtn">➡️ Следующий вопрос</button>
                <button id="finishEarlyBtn" class="finish-btn">🏁 Завершить тест</button>
            </div>
        </div>

        <!-- БЛОК РЕЗУЛЬТАТА (изначально скрыт) -->
        <div id="quizResult" class="result-screen hidden">
            <div class="result-title">🎉 Викторина пройдена!</div>
            <div class="final-score" id="finalScoreSpan">0/10</div>
            <div class="congrats" id="congratsMessage">Ты — настоящий страж слова!</div>
            <button class="restart-btn" id="restartBtn">🔄 Пройти заново</button>
        </div>
    </div>

    <script>
        (function() {
            // --------------------------------------------------------------
            // БАЗА ВОПРОСОВ (10 штук, правильные ответы НЕ под одинаковым номером)
            // --------------------------------------------------------------
            const questions = [
                {
                    text: "Что является главным приоритетом журналиста в работе над новостью?",
                    options: [
                        "Скорость публикации",
                        "Достоверность фактов",
                        "Эмоциональность заголовка",
                        "Красивые фотографии"
                    ],
                    correct: 1  // 0-индекс: Достоверность фактов (второй вариант)
                },
                {
                    text: "Как следует поступить, если ты берёшь интервью у несовершеннолетнего?",
                    options: [
                        "Достаточно устного согласия ребёнка",
                        "Спросить разрешение у классного руководителя",
                        "Получить согласие родителей или опекунов",
                        "Снимать скрытой камерой — так естественнее"
                    ],
                    correct: 2  // третий вариант (родители)
                },
                {
                    text: "Какой заголовок соответствует этике юного журналиста?",
                    options: [
                        "Шокирующие подробности из жизни школы",
                        "Директор провалил ремонт — позор!",
                        "В школе обновили спортзал: репортаж с места событий",
                        "Кошмар в столовой: детей кормят бумагой"
                    ],
                    correct: 2  // третий (нейтральный, фактологический)
                },
                {
                    text: "Что означает принцип «презумпция невиновности» для журналиста?",
                    options: [
                        "Писать только о невиновных людях",
                        "Не называть подозреваемого преступником до решения суда",
                        "Брать интервью только у адвокатов",
                        "Не публиковать фото людей"
                    ],
                    correct: 1  // второй вариант
                },
                {
                    text: "Ты нашёл уникальное фото, но не знаешь автора. Твои действия?",
                    options: [
                        "Опубликовать без подписи — никто не узнает",
                        "Не публиковать, так как нарушаются авторские права",
                        "Поставить свой водяной знак",
                        "Сказать, что фото из интернета, автор неизвестен"
                    ],
                    correct: 1  // второй вариант (не публиковать / нарушение прав)
                },
                {
                    text: "Какая фраза в новостной заметке допустима?",
                    options: [
                        "Ужасная трагедия потрясла наш город",
                        "В результате аварии пострадал один человек",
                        "Безответственный водитель чуть не убил людей",
                        "Жуткое ДТП: все в шоке"
                    ],
                    correct: 1  // второй (без эмоций, факт)
                },
                {
                    text: "Если ты допустил фактическую ошибку в уже вышедшем материале, нужно ли исправлять?",
                    options: [
                        "Нет, никто не заметит",
                        "Да, опубликовать опровержение или исправление с извинениями",
                        "Исправить втихую, не уведомляя читателей",
                        "Только если ошибку кто-то указал"
                    ],
                    correct: 1  // второй вариант
                },
                {
                    text: "Что является «золотым правилом» интервью?",
                    options: [
                        "Перебивать собеседника, чтобы не упустить время",
                        "Задавать вопросы, на которые можно ответить только «да» или «нет»",
                        "Слушать и задавать уточняющие вопросы, проявляя уважение",
                        "Заранее подготовить только один вопрос"
                    ],
                    correct: 2  // третий вариант (слушать и уточнять)
                },
                {
                    text: "Можно ли использовать диктофонную запись без ведома собеседника?",
                    options: [
                        "Да, если это известный человек",
                        "Нет, это нарушение этики и закона о частной жизни",
                        "Можно, если потом вырезать самый смешной момент",
                        "Только в школе, на перемене"
                    ],
                    correct: 1  // второй (нельзя, нарушение)
                },
                {
                    text: "Для чего нужен «Кодекс юного журналиста»?",
                    options: [
                        "Чтобы наказывать провинившихся",
                        "Чтобы каждый журналист помнил об ответственности и честности",
                        "Для красивого оформления стенда",
                        "Чтобы запугивать новичков"
                    ],
                    correct: 1  // второй (ответственность и честность)
                }
            ];

            // DOM элементы
            const quizActive = document.getElementById('quizActive');
            const quizResult = document.getElementById('quizResult');
            const questionCounterSpan = document.getElementById('questionCounter');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const questionText = document.getElementById('questionText');
            const answersContainer = document.getElementById('answersContainer');
            const nextBtn = document.getElementById('nextBtn');
            const finishEarlyBtn = document.getElementById('finishEarlyBtn');
            const restartBtn = document.getElementById('restartBtn');
            const finalScoreSpan = document.getElementById('finalScoreSpan');
            const congratsMessage = document.getElementById('congratsMessage');

            // Состояние викторины
            let currentIndex = 0;             // 0-9
            let userScore = 0;
            let quizCompleted = false;         // флаг завершения (вывод результата)
            let answerLocked = false;           // заблокирован ли выбор ответа на текущем вопросе
            let totalQuestions = questions.length;

            // Префиксы для вариантов
            const prefixes = ['А', 'Б', 'В', 'Г'];

            // Инициализация: загружаем первый вопрос
            function initQuiz() {
                currentIndex = 0;
                userScore = 0;
                answerLocked = false;
                quizCompleted = false;
                updateScore();
                renderQuestion(currentIndex);
                quizActive.classList.remove('hidden');
                quizResult.classList.add('hidden');
            }

            // Обновление счёта в хедере
            function updateScore() {
                scoreDisplay.innerText = userScore + ' ⚡';
            }

            // Рендер вопроса по индексу
            function renderQuestion(index) {
                // убираем блокировку (для нового вопроса)
                answerLocked = false;
                const q = questions[index];
                questionText.innerText = q.text;
                questionCounterSpan.innerText = `Вопрос ${index+1} / ${totalQuestions}`;

                // строим ответы
                let htmlStr = '';
                for (let i = 0; i < q.options.length; i++) {
                    htmlStr += `
                        <div class="answer-item" data-opt-index="${i}">
                            <span class="answer-prefix">${prefixes[i]}</span>
                            <span>${q.options[i]}</span>
                        </div>
                    `;
                }
                answersContainer.innerHTML = htmlStr;

                // навешиваем обработчики (класс disabled-answer ещё не стоит)
                const answerDivs = document.querySelectorAll('.answer-item');
                answerDivs.forEach(div => {
                    div.addEventListener('click', answerClickHandler);
                });

                // Кнопка "Следующий вопрос" активна? Оставляем, но её поведение зависит от ответа/конца
                // при locked = false переход возможен только после выбора (будем проверять)
                // Но сделаем, чтобы если ответили, то переход работает
            }

            // Обработчик клика по ответу
            function answerClickHandler(event) {
                // Предотвратим случайный клик по родителю
                const answerDiv = event.currentTarget;

                // Если уже заблокировано (уже ответили на этот вопрос) — ничего не делаем
                if (answerLocked || quizCompleted) return;

                const selectedIdx = parseInt(answerDiv.dataset.optIndex);
                const currentQ = questions[currentIndex];
                const correctIdx = currentQ.correct;

                // Заблокируем выбор (нельзя изменить после ответа)
                answerLocked = true;

                // Подсветка: сначала добавим классы каждому ответу
                const allAnswers = document.querySelectorAll('.answer-item');

                // Пройдёмся по всем, подсветим верный (зелёный) и неверные, если выбран неверно
                allAnswers.forEach((ans, idx) => {
                    // Сначала уберём старые классы подсветки (на случай повторного клика, но их нет, но для порядка)
                    ans.classList.remove('correct-highlight', 'wrong-highlight', 'show-correct');

                    if (idx === correctIdx) {
                        // Верный ответ всегда подсвечивается зелёным (show-correct)
                        ans.classList.add('show-correct');
                    }

                    if (idx === selectedIdx) {
                        if (idx === correctIdx) {
                            // Выбран верный — зелёный уже есть, добавим extra? но мы уже добавили show-correct. ок
                            // Чтобы визуально выделить именно выбор, он и так зелёный.
                            ans.classList.add('correct-highlight'); // для надёжности
                        } else {
                            // Выбран неверный: сам красный
                            ans.classList.add('wrong-highlight');
                        }
                    }
                });

                // Подсветка дублирующая: для выбранного неверно добавляем wrong-highlight, для верного уже есть show-correct

                // ДОПОЛНИТЕЛЬНО: Если выбран неверный вариант, мы уже подсветили красным сам выбранный,
                // а верный (correctIdx) уже имеет show-correct. 
                // Но по условию "дополнительно подсвечивается, какой ответ был верным" — это уже сделано (show-correct).
                // Может быть ситуация, когда выбран верный, то верный и так зелёный. Ок.

                // Начисляем балл (если выбран верный)
                if (selectedIdx === correctIdx) {
                    userScore++;
                    updateScore();
                }

                // Блокируем клики (уже через answerLocked), но добавим визуальный класс для отключения?
                allAnswers.forEach(ans => ans.classList.add('disabled-answer'));
                // Обработчики сами не сработают благодаря answerLocked, но disabled-answer тоже запрещает pointer-events
                // (стиль .disabled-answer {pointer-events: none;} )
            }

            // Обработка нажатия "Следующий вопрос"
            function goToNext() {
                // Если викторина уже завершена — не должно срабатывать
                if (quizCompleted) return;

                // Если ответ не был выбран (answerLocked === false), может быть нажали случайно
                if (!answerLocked) {
                    alert('⚠️ Сначала выбери вариант ответа!');
                    return;
                }

                // Если текущий вопрос последний?
                if (currentIndex === totalQuestions - 1) {
                    // Это был последний вопрос — показываем результат
                    finishQuiz();
                    return;
                }

                // Переход к следующему вопросу
                currentIndex++;
                renderQuestion(currentIndex);
            }

            // Завершение теста (показывает экран результата)
            function finishQuiz() {
                quizCompleted = true;
                quizActive.classList.add('hidden');
                quizResult.classList.remove('hidden');

                finalScoreSpan.innerText = `${userScore}/${totalQuestions}`;

                // Поздравление в зависимости от баллов
                if (userScore === totalQuestions) {
                    congratsMessage.innerText = '🌟 Идеально! Твоё перо — образец честности!';
                } else if (userScore >= 7) {
                    congratsMessage.innerText = '📸 Отлично! Ты хорошо знаешь кодекс журналиста.';
                } else if (userScore >= 4) {
                    congratsMessage.innerText = '📝 Неплохо! Но стоит повторить правила.';
                } else {
                    congratsMessage.innerText = '🌱 Начинающий корреспондент, мы верим в тебя! Пройди викторину снова.';
                }
            }

            // Событие "Завершить тест" (досрочно)
            function finishEarly() {
                if (quizCompleted) return;
                finishQuiz();
            }

            // Перезапуск
            function restartQuiz() {
                initQuiz();
            }

            // Установка слушателей
            nextBtn.addEventListener('click', goToNext);
            finishEarlyBtn.addEventListener('click', finishEarly);
            restartBtn.addEventListener('click', restartQuiz);

            // Старт!
            initQuiz();

        })();
    </script>
</body>
</html>
